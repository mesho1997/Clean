<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>🧹 Token Hub Cleaner</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:#e2e8f0;
text-align:center;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
margin-bottom:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-top:20px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

textarea{
width:100%;
height:180px;
margin-top:10px;
padding:12px;
border-radius:10px;
border:none;
background:#ffffff;
color:#000000;
font-size:14px;
}

input[type=file]{
margin-top:10px;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:14px;
}

.clean{
background:#22c55e;
color:black;
}

.clear{
background:#ef4444;
color:white;
}

.copy{
background:#38bdf8;
color:black;
}

.clean:hover{
background:#16a34a;
}

.clear:hover{
background:#dc2626;
}

.copy:hover{
background:#0ea5e9;
}

.stats{
margin-top:15px;
font-size:16px;
line-height:1.8;
}

</style>

</head>

<body>

<div class="container">

<h1>🧹 Token Hub Cleaner</h1>

<div class="box">

<h3>📂 Upload Tokens File (.txt)</h3>

<input type="file" id="fileInput" accept=".txt">

</div>

<div class="box">

<h3>📥 Paste Tokens</h3>

<textarea id="input" placeholder="Paste tokens here..."></textarea>

<button class="clean" onclick="cleanTokens()">🧹 Clean Tokens</button>
<button class="clear" onclick="clearAll()">🗑 Clear</button>

<div class="stats" id="stats"></div>

</div>

<div class="box">

<h3>✅ Clean Tokens</h3>

<textarea id="output" placeholder="Clean tokens will appear here"></textarea>

<button class="copy" onclick="copyTokens()">📋 Copy Clean Tokens</button>

</div>

<div class="box">

<h3>♻️ Duplicate Tokens</h3>

<textarea id="duplicates" placeholder="Duplicate tokens will appear here"></textarea>

</div>

</div>

<script>

document.getElementById("fileInput").addEventListener("change", function(event){

let file = event.target.files[0];

if(!file) return;

let reader = new FileReader();

reader.onload = function(e){

document.getElementById("input").value = e.target.result;

};

reader.readAsText(file);

});


function cleanTokens(){

let lines = document.getElementById("input").value.split(/\n+/)

let unique = new Set()
let duplicates = new Set()

lines.forEach(line => {

let token = line.replace(/"/g,"").trim()

if(token === "") return

if(unique.has(token)){
duplicates.add(token)
}else{
unique.add(token)
}

})

let cleanList=[...unique]
let dupList=[...duplicates]

document.getElementById("output").value=cleanList.join("\n")
document.getElementById("duplicates").value=dupList.join("\n")

let original=lines.filter(x=>x.trim()!="").length
let finalCount=cleanList.length
let dupCount=dupList.length

document.getElementById("stats").innerHTML=
"📊 Original Tokens: "+original+
"<br>♻️ Duplicate Tokens: "+dupCount+
"<br>✅ Clean Tokens: "+finalCount

}

function copyTokens(){

let text=document.getElementById("output")

text.select()
text.setSelectionRange(0,999999)

document.execCommand("copy")

alert("✅ Tokens copied!")

}

function clearAll(){

document.getElementById("input").value=""
document.getElementById("output").value=""
document.getElementById("duplicates").value=""
document.getElementById("stats").innerHTML=""

}

</script>

</body>
</html>
