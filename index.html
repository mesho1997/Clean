<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>🧹 Token Hub Cleaner</title>

<style>

body{
font-family:Segoe UI;
background: linear-gradient(rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.4)), url('background.jpg');
background-size: cover;
background-position: center;
background-attachment: fixed;
color:#e2e8f0;
text-align:center;
padding:40px;
margin:0;
min-height:100vh;
}

.container{
max-width:900px;
margin:auto;
}

h1{
margin-bottom:20px;
text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
font-size:2.5em;
}

.box{
background:rgba(30, 41, 59, 0.2);  /* شفافة جداً 20% */
backdrop-filter: blur(10px);  /* ضبابية خفيفة للزجاج */
padding:20px;
border-radius:16px;
margin-top:20px;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
border:1px solid rgba(255,255,255,0.2);
}

textarea{
width:100%;
height:180px;
margin-top:10px;
padding:12px;
border-radius:10px;
border:none;
background:rgba(255, 255, 255, 0.85);  /* شفافة قليلاً */
color:#000000;
font-size:14px;
backdrop-filter: blur(4px);
}

textarea:focus{
outline:2px solid #38bdf8;
background:rgba(255, 255, 255, 0.95);
}

input[type=file]{
margin-top:10px;
background:rgba(255, 255, 255, 0.1);
padding:12px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.3);
color:#e2e8f0;
width:80%;
backdrop-filter: blur(4px);
}

input[type=file]::file-selector-button{
background:#38bdf8;
border:none;
padding:8px 16px;
border-radius:8px;
color:black;
font-weight:bold;
cursor:pointer;
transition: all 0.3s;
}

input[type=file]::file-selector-button:hover{
background:#0ea5e9;
transform: scale(1.05);
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:14px;
transition: all 0.3s;
background:rgba(255, 255, 255, 0.9);
backdrop-filter: blur(4px);
border:1px solid rgba(255,255,255,0.3);
}

button:hover{
transform: translateY(-3px) scale(1.02);
box-shadow: 0 10px 25px rgba(0,0,0,0.4);
background:rgba(255, 255, 255, 1);
}

.clean{
background:rgba(34, 197, 94, 0.9);
color:black;
}

.clear{
background:rgba(239, 68, 68, 0.9);
color:white;
}

.copy{
background:rgba(56, 189, 248, 0.9);
color:black;
}

.clean:hover{
background:rgba(34, 197, 94, 1);
}

.clear:hover{
background:rgba(239, 68, 68, 1);
}

.copy:hover{
background:rgba(56, 189, 248, 1);
}

.stats{
margin-top:15px;
font-size:16px;
line-height:1.8;
background:rgba(0, 0, 0, 0.2);
padding:12px;
border-radius:10px;
backdrop-filter: blur(8px);
border:1px solid rgba(255,255,255,0.1);
}

/* تنسيق العنوان داخل القوائم */
.box h3{
color:#fff;
text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
margin-top:0;
padding-bottom:10px;
font-size:1.3em;
letter-spacing:1px;
}

/* تنسيق النتائج */
#stats{
font-weight:bold;
}

#stats br{
margin:5px 0;
}

</style>

</head>

<body>

<div class="container">

<h1>🧹 Token Hub Cleaner</h1>

<div class="box">

<h3>📂 Upload Tokens File (.txt)</h3>

<input type="file" id="fileInput" accept=".txt">

</div>

<div class="box">

<h3>📥 Paste Tokens</h3>

<textarea id="input" placeholder="Paste tokens here..."></textarea>

<button class="clean" onclick="cleanTokens()">🧹 Clean Tokens</button>
<button class="clear" onclick="clearAll()">🗑 Clear</button>

<div class="stats" id="stats"></div>

</div>

<div class="box">

<h3>✅ Clean Tokens</h3>

<textarea id="output" placeholder="Clean tokens will appear here"></textarea>

<button class="copy" onclick="copyTokens()">📋 Copy Clean Tokens</button>

</div>

<div class="box">

<h3>♻️ Duplicate Tokens</h3>

<textarea id="duplicates" placeholder="Duplicate tokens will appear here"></textarea>

</div>

</div>

<script>

document.getElementById("fileInput").addEventListener("change", function(event){

let file = event.target.files[0];

if(!file) return;

let reader = new FileReader();

reader.onload = function(e){

document.getElementById("input").value = e.target.result;

};

reader.readAsText(file);

});


function cleanTokens(){

let lines = document.getElementById("input").value.split(/\n+/)

let unique = new Set()
let duplicates = new Set()

lines.forEach(line => {

let token = line.replace(/"/g,"").trim()

if(token === "") return

if(unique.has(token)){
duplicates.add(token)
}else{
unique.add(token)
}

})

let cleanList=[...unique]
let dupList=[...duplicates]

document.getElementById("output").value=cleanList.join("\n")
document.getElementById("duplicates").value=dupList.join("\n")

let original=lines.filter(x=>x.trim()!="").length
let finalCount=cleanList.length
let dupCount=dupList.length

document.getElementById("stats").innerHTML=
"📊 Original Tokens: "+original+
"<br>♻️ Duplicate Tokens: "+dupCount+
"<br>✅ Clean Tokens: "+finalCount

}

function copyTokens(){

let text=document.getElementById("output")

text.select()
text.setSelectionRange(0,999999)

document.execCommand("copy")

alert("✅ Tokens copied!")

}

function clearAll(){

document.getElementById("input").value=""
document.getElementById("output").value=""
document.getElementById("duplicates").value=""
document.getElementById("stats").innerHTML=""

}

</script>

</body>
</html>
